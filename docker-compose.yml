version: '3.8'

services:
  bot:
    build: .
    container_name: yui-bot
    restart: unless-stopped
    volumes:
      - ./sessions:/app/sessions
      - ./storage:/app/storage
      - ./prisma:/app/prisma
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    working_dir: /app

  # Optional: PostgreSQL if you want to use it instead of SQLite
